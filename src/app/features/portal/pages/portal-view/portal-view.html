<div class="main-wrapper min-vh-100">
    <nav class="navbar border-bottom py-3 shadow-sm bg-body">
        <div class="container">
            <img [src]="logoActual" alt="Logo" style="height: 100px; width: auto;">
            <div class="d-flex align-items-center gap-3">
                <span class="text-uppercase small fw-bold opacity-75 d-none d-md-block">
                    Viceministerio de Vivienda y Urbanismo
                </span>
                <button class="btn btn-outline-secondary rounded-circle" (click)="toggleTheme()">
                    <i class="bi" [class.bi-moon]="logoActual.includes('negro')"
                        [class.bi-sun]="logoActual.includes('blanco')"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero-section py-5">
        <div class="container text-center">
            <div class="mb-3">
                <img src="assets/viceministro.jpg" class="rounded-circle shadow-lg border border-4 border-white"
                    style="width: 180px; height: 180px; object-fit: cover;">
            </div>
            <h2 class="fw-bold mb-1">{{ (client$ | async)?.name }}</h2>
            <p class="text-primary text-uppercase small fw-bold tracking-widest">Viceministro de Vivienda y Urbanismo
            </p>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="text-center mb-4">
                    <h3 class="fw-bold h4">Cronograma de Actividades</h3>
                    <p class="text-muted">A continuación se detallan las reuniones, eventos y actividades oficiales
                        programadas para la presente jornada.</p>
                </div>

                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-primary text-white p-3 border-0">
                        <h5 class="mb-0 d-flex align-items-center">
                            <i class="bi bi-calendar-check me-2"></i> Agenda Oficial de Actividades
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <app-calendar></app-calendar>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<app-whatsapp-button *ngIf="(asistenteActivo$ | async) as asistentes"
    [phoneNumber]="asistentes[0]?.whatsappNumber ?? ''" [visible]="asistentes.length > 0">
</app-whatsapp-button>
