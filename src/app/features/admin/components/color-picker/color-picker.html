<div class="card shadow-sm mb-3">
    <div class="card-body p-3">
        <h6 class="fw-bold small mb-3 text-uppercase">Nueva Etiqueta / Grupo</h6>
        <div class="input-group input-group-sm">
            <input type="text" class="form-control" placeholder="Nombre" [(ngModel)]="label.name">
            <input type="color" class="form-control form-control-color" [(ngModel)]="label.color" style="width: 45px;">
            <button class="btn btn-dark" (click)="crearEtiqueta()">+</button>
        </div>
    </div>
</div>
